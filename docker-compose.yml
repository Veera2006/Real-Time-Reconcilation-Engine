services:
  kafka:
    image: apache/kafka:latest
    container_name: recon-kafka
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:9094"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9094"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  matching-engine:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: recon-matching-engine
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8001:8000"
    depends_on:
      - kafka
    restart: unless-stopped

  pg-producer:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: recon-pg-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: ["python", "pg_producer.py"]
    depends_on:
      - kafka
    restart: unless-stopped

  oms-producer:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: recon-oms-producer
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    command: ["python", "oms_producer.py"]
    depends_on:
      - kafka
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: recon-frontend
    environment:
      VITE_WS_URL: ws://localhost:8001/ws/recon
    ports:
      - "8080:8080"
    depends_on:
      - matching-engine
    restart: unless-stopped
